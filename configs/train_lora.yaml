model_name_or_path: openai/whisper-small
processed_manifest: outputs/processed_manifest
output_dir: outputs/whisper-small-indic-lora
language: multilingual
task: transcribe
train_split: train
eval_split: validation
max_train_samples:
max_eval_samples:
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 0.0001
num_train_epochs: 3
warmup_steps: 100
logging_steps: 25
eval_steps: 250
save_steps: 250
generation_max_length: 225
fp16: true
bf16: false
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

