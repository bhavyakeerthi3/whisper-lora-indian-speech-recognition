model_name_or_path: openai/whisper-small
processed_manifest: hdfs:///datasets/indic_asr/processed_manifest
output_dir: hdfs:///models/whisper-small-indic-lora
language: multilingual
task: transcribe
train_split: train
eval_split: validation
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 0.0001
num_train_epochs: 3
warmup_steps: 500
logging_steps: 50
eval_steps: 500
save_steps: 500
generation_max_length: 225
fp16: false
bf16: true
deepspeed: configs/deepspeed_zero2.json
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

